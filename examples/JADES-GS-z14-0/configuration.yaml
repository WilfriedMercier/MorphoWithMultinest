# Add as many bands as required following the layout below
bands:

  F277W:
    image      : f277w-clear.fits     # Input image
    error      : f277w-clear_err.fits # Error map
    psf        : psf_f277w.fits       # PSF in the given band without oversampling
    mag_offset : 28.08652             # Magnitude offset used to convert from the flux unit of the images to magnitudes

  F444W:
    image      : f444w-clear.fits
    error      : f444w-clear_err.fits
    psf        : psf_f444w.fits
    mag_offset : 28.08652

mask: mask.fits # Mask (same for all bands) with True for masked pixels

# Output path
out_path: multinest

# Parameters used when plotting. They can be omitted
plot_info:
  
  unit   : 'MJy/sr' # Flux unit of the images. If omitted, it is assumed to be MJy/sr
  pscale : 0.03     # Size of one pixel in arcsec. It omitted, it is assumed to be 30 mas

# Parameters for multinest
multinest:                              
  
  resume               : False
  verbose              : False
  max_iter             : 0
  n_live_points        : 100
  sampling_efficiency  : 0.8
  evidence_tolerance   : 0.5
  n_iter_before_update : 100
  null_log_evidence    : -1.0e+90,
  max_modes            : 100
  mode_tolerance       : -1.0e+60